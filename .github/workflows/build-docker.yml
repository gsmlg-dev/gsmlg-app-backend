name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version'
        required: true
        default: '1.0.0'
        type: string
      target:
        description: 'Release target to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - admin
          - public

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: backend
            tag_suffix: ''
            latest_suffix: ''
          - target: admin
            tag_suffix: '-admin'
            latest_suffix: '-admin'
          - target: public
            tag_suffix: '-public'
            latest_suffix: '-public'

    # Skip matrix entries that don't match the selected target
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == matrix.target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.latest_suffix }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELEASE_VERSION=${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.target }}" == "all" || "${{ github.event.inputs.target }}" == "backend" ]]; then
            echo "| backend | \`${{ github.event.inputs.version }}\` | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ github.event.inputs.target }}" == "all" || "${{ github.event.inputs.target }}" == "admin" ]]; then
            echo "| admin | \`${{ github.event.inputs.version }}-admin\` | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ github.event.inputs.target }}" == "all" || "${{ github.event.inputs.target }}" == "public" ]]; then
            echo "| public | \`${{ github.event.inputs.version }}-public\` | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Registry: \`${{ env.REGISTRY }}/${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
