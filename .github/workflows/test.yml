name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gsmlg_app
          POSTGRES_PASSWORD: gsmlg_app
          POSTGRES_DB: gsmlg_app_admin_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Create database
        env:
          MIX_ENV: test
          DATABASE_URL_TEST: ecto://gsmlg_app:gsmlg_app@localhost:5433/gsmlg_app_admin_test
        run: mix ecto.create

      - name: Run migrations
        env:
          MIX_ENV: test
          DATABASE_URL_TEST: ecto://gsmlg_app:gsmlg_app@localhost:5433/gsmlg_app_admin_test
        run: mix ecto.migrate

      - name: Run tests
        env:
          MIX_ENV: test
          DATABASE_URL_TEST: ecto://gsmlg_app:gsmlg_app@localhost:5433/gsmlg_app_admin_test
        run: mix test
